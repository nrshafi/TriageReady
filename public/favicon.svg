<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">TriageReady logo</title>
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4493f8" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#3fb950" flood-opacity="0.6"/>
    </filter>
    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#4493f8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)" stroke="#30363d" stroke-width="2" />
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="6 8" opacity="0.4" />
  
  <!-- Inner target circle -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#30363d" stroke-width="2" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-dasharray="80 120" stroke-linecap="round" />

  <!-- Stylized Geometric T and Checkmark -->
  <g transform="translate(0, 1)">
    <!-- Horizontal Bar of T -->
    <rect x="24" y="28" width="52" height="6" rx="3" fill="#e6edf3" filter="url(#blueGlow)" />
    
    <!-- Vertical stem of T -->
    <path d="M50 28 V 56" stroke="#e6edf3" stroke-width="6.5" stroke-linecap="round" />
    
    <!-- Glowing green checkmark -->
    <path d="M38 52 L 49.5 63.5 L 74 31" fill="none" stroke="#3fb950" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  </g>
</svg>
